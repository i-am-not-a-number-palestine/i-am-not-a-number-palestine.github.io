  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Kufi+Arabic:wght@300;400;600&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/i-am-not-a-number/assets/index-C39GBPz8.js"></script>
  <link rel="stylesheet" crossorigin href="/i-am-not-a-number/assets/index-xEnrDdOs.css">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DXNVYQYGWT"></script>

<body>
  <canvas id="canvas"></canvas>

  <div id="header">
    <img id="handala" src="./Handala.png" alt="Handala">
    <h1 id="title">I Am Not a Number</h1>
    <p id="subtitle">In memory of the <span id="count">72,000+</span> Palestinians killed in the Israeli genocide in Gaza.</p>
  </div>

  <div id="top-buttons">
    <button id="lang-toggle" aria-label="Toggle language">عربي</button>
    <button id="info-btn" aria-label="Information">i</button>
    <button id="filter-btn" aria-label="Filter by age">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M1 3h14M3 8h10M5.5 13h5"/>
      </svg>
    </button>
    <button id="mute-btn" aria-label="Toggle sound">
      <svg id="icon-unmuted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      <svg id="icon-muted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/>
        <line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
    </button>
  </div>

  <audio id="bg-audio" src="./darwish.mp3" loop preload="auto"></audio>

  <div id="info-modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" aria-label="Close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="filter-panel" class="hidden">
    <div id="filter-header">
      <span id="filter-title">Filter by Age</span>
      <button id="filter-close" aria-label="Close filter">&times;</button>
    </div>
    <div id="filter-range">
      <div id="range-track">
        <div id="range-fill"></div>
        <input type="range" id="range-min" min="0" max="110" value="0" step="1">
        <input type="range" id="range-max" min="0" max="110" value="110" step="1">
      </div>
      <div id="range-labels">
        <span id="range-min-label">0</span>
        <span id="range-max-label">110+</span>
      </div>
    </div>
    <div id="filter-stats">
      <span id="filter-showing">Showing: <strong id="filter-count">60,199</strong></span>
    </div>
    <button id="filter-reset">Reset</button>
  </div>

  <div id="info-card" class="hidden">
    <div id="info-silhouette"></div>
    <div id="info-content">
      <p id="info-name" class="info-primary"></p>
      <p id="info-name-alt" class="info-secondary"></p>
      <div id="info-details">
        <span id="info-age"></span>
        <span id="info-born"></span>
      </div>
    </div>
  </div>

  <div id="loading">
    <div id="loading-inner">
      <div id="loading-text">Loading 60,199 lives...</div>
      <div id="loading-bar"><div id="loading-fill"></div></div>
    </div>
    <button id="enter-btn" class="hidden">Enter</button>
  </div>

  <div id="footer">
    <p id="footer-text">Each light represents a life. Hover to remember them.</p>
  </div>

</body>
</html>
